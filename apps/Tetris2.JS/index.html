<!DOCTYPE html>
<html lang="en" dir="ltr">

        <link rel="stylesheet" href="./styles.css">

        <div id="gameBoard" style="display:none">

            <canvas id="canvasNext" width="80" height="80"></canvas>

            <div id="score">0/0</div>

                <td style="">

        </div>
